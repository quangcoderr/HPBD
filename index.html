<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bố</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    gap: 28px;
    position: relative;
  }

  /* ── Night sky background ── */
  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(
      180deg,
      #07091a 0%,
      #0e1435 25%,
      #1a2060 50%,
      #2a2555 70%,
      #3b2060 85%,
      #1e1030 100%
    );
  }

  /* Stars */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* Clouds */
  .cloud-layer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* Fireworks */
  #fw {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  canvas#c {
    display: block;
    max-width: 100%;
    transition: opacity 0.8s ease;
  }

  /* Wrapper that stacks canvas + crisp text */
  .text-wrap {
    position: relative;
  }

  .crisp-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0;
    transition: opacity 0.9s ease;
    pointer-events: none;
  }

  .crisp-text .line1 {
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: clamp(26px, 7.5vw, 54px);
    color: #ffffff;
    text-shadow:
      0 0 18px rgba(255,248,180,0.9),
      0 0 40px rgba(255,220,100,0.5),
      0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.2;
    white-space: nowrap;
  }
  .crisp-text .line2 {
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: clamp(17px, 4.8vw, 35px);
    color: #ffffff;
    text-shadow:
      0 0 14px rgba(255,248,180,0.9),
      0 0 30px rgba(255,220,100,0.5),
      0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.2;
    white-space: nowrap;
  }

  .cake  { font-style: normal; filter: drop-shadow(0 0 6px rgba(255,180,0,0.8)); }
  .heart { font-style: normal; color: #ff4d6d; filter: drop-shadow(0 0 8px rgba(255,60,80,0.9)); }

  /* Info badge */
  .info-badge {
    display: flex;
    gap: 20px;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.7s 3.4s forwards;
  }
  .badge-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .badge-label {
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .badge-value {
    font-family: 'Dancing Script', cursive;
    font-size: 22px;
    background: linear-gradient(90deg,#f59e0b,#ef4444,#ec4899,#8b5cf6,#06b6d4,#f59e0b);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }
  .badge-sep {
    width: 1px; height: 36px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.25), transparent);
  }
  @keyframes shimmer {
    from { background-position: 0% center; }
    to   { background-position: 200% center; }
  }

  /* Photo */
  .photo-slot {
    width: 180px; height: 180px;
    border-radius: 50%;
    position: relative;
    overflow: visible;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.7s 3.8s forwards;
  }
  .photo-slot::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(#f59e0b,#ef4444,#ec4899,#8b5cf6,#06b6d4,#10b981,#f59e0b);
    animation: spinRing 3s linear infinite;
    z-index: -1;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .photo-inner {
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(10,12,40,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    overflow: hidden;
  }
  .photo-inner svg { opacity: 0.3; }
  .photo-inner span {
    font-family: 'Quicksand', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
  }
  .photo-inner img {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }
  input[type="file"] { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="sky"></div>
<canvas id="stars-canvas"></canvas>

<!-- Clouds SVG layer -->
<svg class="cloud-layer" viewBox="0 0 1440 320" preserveAspectRatio="none" style="height:320px">
  <defs>
    <filter id="blur1"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <!-- back clouds – dark navy -->
  <g filter="url(#blur2)" opacity="0.55">
    <ellipse cx="200"  cy="320" rx="380" ry="90"  fill="#1a2060"/>
    <ellipse cx="700"  cy="310" rx="500" ry="110" fill="#1a1d55"/>
    <ellipse cx="1200" cy="315" rx="420" ry="95"  fill="#1e2265"/>
  </g>
  <!-- mid clouds -->
  <g filter="url(#blur1)" opacity="0.75">
    <ellipse cx="120"  cy="340" rx="280" ry="70"  fill="#232a70"/>
    <ellipse cx="500"  cy="330" rx="360" ry="80"  fill="#252b72"/>
    <ellipse cx="900"  cy="335" rx="400" ry="85"  fill="#1f2568"/>
    <ellipse cx="1350" cy="330" rx="300" ry="72"  fill="#20276a"/>
  </g>
  <!-- front cloud wisps – slightly lighter purple-blue -->
  <g opacity="0.55">
    <ellipse cx="300"  cy="360" rx="260" ry="55"  fill="#2e3580"/>
    <ellipse cx="750"  cy="355" rx="350" ry="60"  fill="#2c3378"/>
    <ellipse cx="1150" cy="358" rx="290" ry="58"  fill="#2f3682"/>
  </g>
  <!-- moon glow hint top right -->
  <radialGradient id="moonGlow" cx="85%" cy="10%" r="25%">
    <stop offset="0%" stop-color="#fffde0" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="1440" height="320" fill="url(#moonGlow)"/>
</svg>

<canvas id="fw"></canvas>

<div class="content">

  <!-- Particle canvas (intro animation) -->
  <div class="text-wrap" id="textWrap">
    <canvas id="c"></canvas>
    <!-- Crisp HTML text fades in on top after particles settle -->
    <div class="crisp-text" id="crispText">
      <p class="line1">Chúc mừng sinh nhật bố <span class="cake">🎂</span></p>
      <p class="line2">Chúc bố luôn mạnh khỏe, vui vẻ mỗi ngày <span class="heart">❤️</span></p>
    </div>
  </div>

  <div class="info-badge">
    <div class="badge-item">
      <span class="badge-label">Sinh ngày</span>
      <span class="badge-value">30 / 03 / 1969</span>
    </div>
    <div class="badge-sep"></div>
    <div class="badge-item">
      <span class="badge-label">Tuổi</span>
      <span class="badge-value">57 🎉</span>
    </div>
  </div>

  <label class="photo-slot" id="photoSlot">
    <input type="file" accept="image/*" id="fileInput">
    <div class="photo-inner" id="photoInner">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>Thêm ảnh bố</span>
    </div>
  </label>
</div>

<script>
/* =========================================
   STARS
   ========================================= */
(function () {
  const sc   = document.getElementById('stars-canvas');
  const sctx = sc.getContext('2d');
  sc.width   = window.innerWidth;
  sc.height  = window.innerHeight;

  const stars = Array.from({ length: 180 }, () => ({
    x: Math.random() * sc.width,
    y: Math.random() * sc.height * 0.85,
    r: Math.random() * 1.4 + 0.3,
    alpha: Math.random(),
    speed: Math.random() * 0.008 + 0.003
  }));

  function drawStars(t) {
    sctx.clearRect(0, 0, sc.width, sc.height);
    stars.forEach(s => {
      s.alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60));
      sctx.globalAlpha = s.alpha;
      sctx.fillStyle   = '#fff';
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sctx.fill();
    });
    sctx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);
})();

/* =========================================
   TEXT PARTICLES
   ========================================= */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const LINE1 = 'Chúc mừng sinh nhật bố 🎂';
const LINE2 = 'Chúc bố luôn mạnh khỏe, vui vẻ mỗi ngày ❤️';

const DPR = Math.min(window.devicePixelRatio || 1, 2);
const W   = Math.min(window.innerWidth - 24, 700);
const H   = Math.round(W * 0.40);
const FS1 = Math.max(Math.round(W * 0.082), 28);
const FS2 = Math.max(Math.round(W * 0.054), 18);

canvas.width  = W * DPR;
canvas.height = H * DPR;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(DPR, DPR);

function sampleText() {
  const off   = document.createElement('canvas');
  const SCALE = 2;
  off.width   = W * SCALE;
  off.height  = H * SCALE;
  const c = off.getContext('2d');
  c.scale(SCALE, SCALE);
  c.fillStyle = '#fff';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.font = `700 ${FS1}px 'Dancing Script', cursive`;
  c.fillText(LINE1, W / 2, H * 0.31);
  c.font = `700 ${FS2}px 'Dancing Script', cursive`;
  c.fillText(LINE2, W / 2, H * 0.74);
  const data = c.getImageData(0, 0, W * SCALE, H * SCALE).data;
  const pts  = [];
  const STEP = 5;
  for (let y = 0; y < H * SCALE; y += STEP)
    for (let x = 0; x < W * SCALE; x += STEP)
      if (data[(y * W * SCALE + x) * 4 + 3] > 140)
        pts.push({ x: x / SCALE, y: y / SCALE });
  return pts;
}

const PALETTE = ['#ffffff','#ffffff','#fff8dc','#fffacd','#fde68a','#fcd34d'];
const pick = () => PALETTE[Math.floor(Math.random() * PALETTE.length)];

class P {
  constructor(tx, ty) {
    this.tx = tx; this.ty = ty;
    this.color = pick();
    const side = Math.floor(Math.random() * 4);
    if      (side === 0) { this.x = Math.random() * W; this.y = -10; }
    else if (side === 1) { this.x = W + 10; this.y = Math.random() * H; }
    else if (side === 2) { this.x = Math.random() * W; this.y = H + 10; }
    else                 { this.x = -10; this.y = Math.random() * H; }
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8;
    this.size = Math.random() * 1.5 + 1.0;
    this.phase = 'scatter';
  }
  update() {
    if (this.phase === 'scatter') {
      this.x += this.vx; this.y += this.vy;
    } else {
      const dx = this.tx - this.x, dy = this.ty - this.y;
      this.vx += dx * 0.065; this.vy += dy * 0.065;
      this.vx *= 0.77;       this.vy *= 0.77;
      this.x += this.vx;     this.y += this.vy;
    }
  }
  draw() {
    ctx.shadowBlur  = 8;
    ctx.shadowColor = '#fffbe0';
    ctx.fillStyle   = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

let particles = [], frame = 0;
// After SETTLE_FRAME frames of gathering, fade in crisp text
const SCATTER_F = 55;
const SETTLE_F  = 160; // ~2.6s after gather starts

document.fonts.ready.then(() => {
  setTimeout(() => {
    const pts = sampleText();
    particles = pts.map(p => new P(p.x, p.y));

    function loop() {
      ctx.clearRect(0, 0, W, H);
      frame++;
      if (frame === SCATTER_F) particles.forEach(p => p.phase = 'gather');

      // Once settled: fade in crisp text, fade out canvas
      if (frame === SCATTER_F + SETTLE_F) {
        document.getElementById('crispText').style.opacity = '1';
        canvas.style.opacity = '0';
      }

      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  }, 80);
});

/* =========================================
   FIREWORKS
   ========================================= */
const fw   = document.getElementById('fw');
const fctx = fw.getContext('2d');
fw.width   = window.innerWidth;
fw.height  = window.innerHeight;

const FW_PAL = ['#facc15','#f87171','#ec4899','#c084fc','#38bdf8','#34d399','#fb923c','#fff','#a5f3fc'];

let fwSparks = [];

function addBurst(x, y) {
  const count = 32 + Math.floor(Math.random() * 20);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.2;
    const speed = 2.5 + Math.random() * 4.5;
    fwSparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color: FW_PAL[Math.floor(Math.random() * FW_PAL.length)],
      size: Math.random() * 2.5 + 1.5,
      trail: []
    });
  }
}

function fwLoop() {
  fctx.clearRect(0, 0, fw.width, fw.height);
  fwSparks = fwSparks.filter(s => s.alpha > 0.02);
  fwSparks.forEach(s => {
    s.trail.push({ x: s.x, y: s.y, alpha: s.alpha });
    if (s.trail.length > 5) s.trail.shift();

    // draw trail
    s.trail.forEach((t, i) => {
      const a = (i / s.trail.length) * s.alpha * 0.4;
      fctx.globalAlpha = a;
      fctx.fillStyle   = s.color;
      fctx.beginPath();
      fctx.arc(t.x, t.y, s.size * 0.5, 0, Math.PI * 2);
      fctx.fill();
    });

    fctx.globalAlpha = s.alpha;
    fctx.shadowBlur  = 14;
    fctx.shadowColor = s.color;
    fctx.fillStyle   = s.color;
    fctx.beginPath();
    fctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    fctx.fill();
    fctx.shadowBlur  = 0;
    fctx.globalAlpha = 1;

    s.x += s.vx; s.y += s.vy;
    s.vy += 0.055;
    s.vx *= 0.98;
    s.alpha -= 0.016;
    s.size  *= 0.975;
  });
  requestAnimationFrame(fwLoop);
}
fwLoop();

function randomBurst() {
  const x = fw.width  * (0.08 + Math.random() * 0.84);
  const y = fw.height * (0.04 + Math.random() * 0.50);
  addBurst(x, y);
}

setTimeout(() => {
  randomBurst();
  setInterval(() => {
    randomBurst();
    if (Math.random() > 0.45) setTimeout(randomBurst, 300);
  }, 1900);
}, 3000);

/* =========================================
   PHOTO UPLOAD
   ========================================= */
document.getElementById('fileInput').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const inner = document.getElementById('photoInner');
    inner.querySelectorAll('img').forEach(el => el.remove());
    inner.querySelectorAll('svg,span').forEach(el => el.style.display = 'none');
    const img = document.createElement('img');
    img.src = e.target.result;
    inner.appendChild(img);
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
